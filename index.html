<!DOCTYPE html>
<html>
<head>
  <title>UOS Foundation GPA Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    .logo {
      display: block;
      margin: 0 auto 15px auto;
      width: 100px;
    }

    h1 {
      text-align: center;
      color: #7c0a02;
      margin-bottom: 25px;
      font-size: 24px;
    }

    .subject {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #7c0a02;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      opacity: 0.9;
    }

    #result {
      text-align: center;
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
      color: #222;
    }

    .credit {
      text-align: center;
      font-size: 11px;
      font-style: italic;
      color: gray;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="container">

  <img src="logo.png" alt="UOS Logo" class="logo">

  <h1>UOS FY GPA Calculator</h1>

  <div class="subject">
    <label>Biology 1</label>
    <select id="bio1"></select>
  </div>

  <div class="subject">
    <label>Biochemistry 1</label>
    <select id="biochem1"></select>
  </div>

  <div class="subject">
    <label>Biology 2</label>
    <select id="bio2"></select>
  </div>

  <div class="subject">
    <label>Biochemistry 2</label>
    <select id="biochem2"></select>
  </div>

  <div class="subject">
    <label>Biochemistry Lab</label>
    <select id="lab"></select>
  </div>

  <button onclick="calculateGPA()">Calculate GPA</button>

  <div id="result"></div>

  <p class="credit">Made by Jabir Al-Rawi</p>

</div>

<script>

  const grades = {
    "A": 4.0,
    "B+": 3.5,
    "B": 3.0,
    "C+": 2.5,
    "C": 2.0,
    "D+": 1.5,
    "D": 1.0
  };

  const subjects = [
    "bio1",
    "biochem1",
    "bio2",
    "biochem2",
    "lab"
  ];

  subjects.forEach(id => {

    let select = document.getElementById(id);

    let defaultOption = document.createElement("option");
    defaultOption.text = "Select Grade";
    defaultOption.disabled = true;
    defaultOption.selected = true;
    select.appendChild(defaultOption);

    for (let grade in grades) {
      let option = document.createElement("option");
      option.value = grade;
      option.text = grade;
      select.appendChild(option);
    }
  });

  function calculateGPA() {

    let totalPoints =
      grades[document.getElementById("bio1").value] * 3 +
      grades[document.getElementById("biochem1").value] * 3 +
      grades[document.getElementById("bio2").value] * 4 +
      grades[document.getElementById("biochem2").value] * 3 +
      grades[document.getElementById("lab").value] * 1;

    let gpa = totalPoints / 14;

    document.getElementById("result").innerHTML =
      "Competitive GPA: " + gpa.toFixed(2);
  }

</script>

</body>
</html>
